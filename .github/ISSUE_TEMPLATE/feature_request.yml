name: Feature request
description: Suggest an improvement or new conversion for Inowio D2d.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What conversion, workflow, or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Include sample inputs, outputs, formulas, or references if this is a conversion request.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or alternative design you have considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, links, or examples if useful.
